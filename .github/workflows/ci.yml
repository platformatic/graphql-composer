---
name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x, 26.x]
        os: [ubuntu-latest, windows-latest]
    name: "Node.js ${{ matrix.node-version }}"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use supported Node.js Version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', 'package.json') }}
      - name: Install dependencies
        run: npm install
      - name: Run Tests
        run: npm test
